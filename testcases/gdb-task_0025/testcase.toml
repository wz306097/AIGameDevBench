[testcase]
id = "gdb-task_0025"
category = "behavior_logic"
source_kind = "folder"
source_repo = "GameDevBench:task_0025"
task = """
Implement res://scripts/player_interaction_handler.gd so it extends Area3D with class_name PlayerInteractionHandler, defines an item_picked_up(item_data: ItemData) signal, exports item_types: Array[ItemData], tracks nearby_bodies: Array[InteractableItem], listens for the 'interact' input action in _input(), and runs pickup_nearest_item() to remove the closest InteractableItem, queue_free it, and match its PackedScene path against the exported ItemData array before emitting the signal. Provide _on_body_entered() / _on_body_exited() methods that gain and lose focus on interactables and keep nearby_bodies in sync. Attach this script to PlayerBody/InteractionArea inside res://scenes/main.tscn, set its collision_layer to 0, collision_mask to 2, connect body_entered and body_exited to the script methods, and assign res://resources/items/test_cube.tres plus res://resources/items/test_sphere.tres to the exported array so pickups can be identified. Update project.godot to define an 'interact' action bound to the F key so the handler receives the input.
"""

